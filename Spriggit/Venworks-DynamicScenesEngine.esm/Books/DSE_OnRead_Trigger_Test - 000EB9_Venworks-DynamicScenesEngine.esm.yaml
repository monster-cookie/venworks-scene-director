  LightLayer: 1
Text:
  TargetLanguage: English
  Value: >-
    To the dock rats, rookies, and anyone else still breathing on purpose:


    The next nosy explorer or bounty hunter who wanders into this base is not to be shot on sight. Read that again if your helmet's on too tight.


    Let them come in. Let them sniff around. Let them think they found something worth stealing.


    Once they're past the main entry and deep enough that running starts looking like a life choice, trigger the trap. No early fireworks. No showing off. No "accidental" button pressing because you got jumpy. Wait until they're boxed in, then spring it.


    When the signal hits, send in a proper welcome party. Two to four of you get in there fast, weapons hot, mouths shut. The boss will follow in once the mark is softened up.


    And if any of you forget to pull the trigger on this little surprise, I'll feed you to the Terrormorph myself and tell everyone you volunteered.


    Keep it sharp. Keep it bloody. Keep it ours.


    Captain's orders.
